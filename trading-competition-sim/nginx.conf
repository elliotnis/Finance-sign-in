server {
    listen 80;
    server_name localhost;
    # Preserve the browser-facing host and port when nginx emits relative
    # compatibility redirects from inside a Docker port mapping.
    absolute_redirect off;
    # This container is now a compatibility gateway to the canonical React
    # challenge. Keeping one game prevents a browser-local simulation from
    # bypassing the shared host-controlled rounds.
    location = / {
        return 302 /youth-financetopia;
    }

    location = /api {
        return 308 /api/;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Serve only the challenge SPA routes and its built assets. The normal
    # sign-up portal must not become reachable through this compatibility URL.
    location ^~ /assets/ {
        proxy_pass http://youth-financetopia-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /vite.svg {
        proxy_pass http://youth-financetopia-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /youth-financetopia {
        proxy_pass http://youth-financetopia-frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /youth-financetopia/ {
        proxy_pass http://youth-financetopia-frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
