services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URI: ${DATABASE_URI:-mongodb://mongo:27017}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Passwordless email login (Gmail SMTP). All optional but required for the magic-link flow.
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      MAGIC_LINK_TTL_MINUTES: ${MAGIC_LINK_TTL_MINUTES:-15}
      MAGIC_LINK_REQUEST_COOLDOWN_SECONDS: ${MAGIC_LINK_REQUEST_COOLDOWN_SECONDS:-60}
      TRADING_SESSION_TTL_HOURS: ${TRADING_SESSION_TTL_HOURS:-12}
      # Admins allowed to create/cancel classes (comma-separated emails)
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      # Dedicated event hosts; normal portal admins do not inherit this role.
      # Keep the approved Youth Financetopia hosts available when the server's
      # preserved .env has not yet declared GAMEMASTER_EMAILS.
      GAMEMASTER_EMAILS: ${GAMEMASTER_EMAILS:-cylaucb@connect.ust.hk,mikiyeung@ust.hk}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  youth-financetopia-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_APP_AUDIENCE: youth-financetopia
    restart: unless-stopped
    depends_on:
      - backend

  trading-competition-sim:
    build:
      context: ./trading-competition-sim
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - youth-financetopia-frontend
    ports:
      - "${TRADING_SIM_PORT:-4173}:80"

volumes:
  mongo_data:
