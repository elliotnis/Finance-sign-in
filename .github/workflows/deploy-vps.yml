name: Test and deploy to FNZ231

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-fnz231-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install + build
        working-directory: frontend
        run: npm ci && npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend deps + syntax check
        working-directory: backend
        run: |
          python -m pip install -r app/requirements.txt
          python -m compileall -q .

  deploy:
    name: Deploy to FNZ231
    needs: test
    # This repository-scoped runner is installed on FNZ231. It connects
    # outbound to GitHub, so the server's restricted SSH firewall stays closed.
    runs-on: [self-hosted, linux, x64, fnz231-deploy]
    env:
      DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/home/adm1/sign-up-system' }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Configure project-account SMTP credentials
        shell: bash
        env:
          SMTP_PASSWORDYFC_SECRET: ${{ secrets.SMTP_PASSWORDYFC }}
          SMTP_PASSWORDFINAUGEVENTS_SECRET: ${{ secrets.SMTP_PASSWORDFINAUGEVENTS }}
        run: |
          set -euo pipefail

          if [[ -z "$SMTP_PASSWORDYFC_SECRET" || -z "$SMTP_PASSWORDFINAUGEVENTS_SECRET" ]]; then
            echo "Required project-account SMTP secrets are not configured." >&2
            exit 1
          fi

          python3 - "$DEPLOY_PATH/.env" <<'PY'
          import os
          import sys
          from pathlib import Path

          env_path = Path(sys.argv[1])
          updates = {
              "SMTP_HOST": "smtp.ust.hk",
              "SMTP_PORT": "587",
              "SMTP_USERFINAUGEVENTS": "finaugevents",
              "SMTP_PASSWORDFINAUGEVENTS": os.environ["SMTP_PASSWORDFINAUGEVENTS_SECRET"],
              "SMTP_FROMFINAUGEVENTS": '"HKUST FINA Portal <finaugevents@ust.hk>"',
              "SMTP_USERYFC": "yfc",
              "SMTP_PASSWORDYFC": os.environ["SMTP_PASSWORDYFC_SECRET"],
              "SMTP_FROMYFC": '"Youth Financetopia <yfc@ust.hk>"',
          }

          existing = env_path.read_text().splitlines() if env_path.exists() else []
          written = set()
          output = []
          for line in existing:
              key = line.split("=", 1)[0].strip() if "=" in line else None
              if key in updates:
                  if key not in written:
                      output.append(f"{key}={updates[key]}")
                      written.add(key)
              else:
                  output.append(line)

          for key, value in updates.items():
              if key not in written:
                  output.append(f"{key}={value}")

          temp_path = env_path.with_suffix(".env.tmp")
          temp_path.write_text("\n".join(output) + "\n")
          temp_path.chmod(0o600)
          temp_path.replace(env_path)
          print("Updated the FNZ231 SMTP profile configuration.")
          PY

      - name: Update the Compose stack
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"

          # Keep server-only configuration (.env) and Mongo data intact while
          # making tracked application files match the deployed branch.
          git fetch --prune origin "$DEPLOY_BRANCH"
          git checkout --force "origin/$DEPLOY_BRANCH"

          docker compose up -d --build --remove-orphans

          # Fail the deployment if the public web page or proxied API is not up.
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1/ >/dev/null \
              && curl --fail --silent --show-error http://127.0.0.1/api/_health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker compose ps
          echo "Deployment health checks did not pass." >&2
          exit 1
